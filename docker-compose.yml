services:
  # SATU Database untuk semua service (Menghemat RAM)
  db-shared:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gpdi_user
      POSTGRES_PASSWORD: gpdi_password
      POSTGRES_DB: postgres
    networks:
      - gpdi-network
    volumes:
      - pg-shared-data:/var/lib/postgresql/data
      - ./docker-scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  # Application Services
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    volumes:
      - ./api-gateway:/var/www:delegated
    ports:
      - "8000:8000"
    environment:
      - PHP_CLI_SERVER_WORKERS=4
    command: php artisan serve --host=0.0.0.0 --port=8000 --no-reload
    networks:
      - gpdi-network
    depends_on:
      - db-shared

  administration-utility-service:
    build:
      context: ./administration-utility-service
      dockerfile: Dockerfile
    volumes:
      - ./administration-utility-service:/var/www:delegated
    ports:
      - "8004:8004"
    environment:
      - PHP_CLI_SERVER_WORKERS=4
    command: php artisan serve --host=0.0.0.0 --port=8004 --no-reload
    networks:
      - gpdi-network
    depends_on:
      - db-shared

  content-publication-service:
    build:
      context: ./content-publication-service
      dockerfile: Dockerfile
    volumes:
      - ./content-publication-service:/var/www:delegated
    ports:
      - "8002:8002"
    environment:
      - PHP_CLI_SERVER_WORKERS=4
    command: php artisan serve --host=0.0.0.0 --port=8002 --no-reload
    networks:
      - gpdi-network
    depends_on:
      - db-shared

  event-rayon-service:
    build:
      context: ./event-rayon-service
      dockerfile: Dockerfile
    volumes:
      - ./event-rayon-service:/var/www:delegated
    ports:
      - "8003:8003"
    environment:
      - PHP_CLI_SERVER_WORKERS=4
    command: php artisan serve --host=0.0.0.0 --port=8003 --no-reload
    networks:
      - gpdi-network
    depends_on:
      - db-shared

  user-account-service:
    build:
      context: ./user-account-service
      dockerfile: Dockerfile
    volumes:
      - ./user-account-service:/var/www:delegated
    ports:
      - "8001:8001"
    environment:
      - PHP_CLI_SERVER_WORKERS=4
    command: php artisan serve --host=0.0.0.0 --port=8001 --no-reload
    networks:
      - gpdi-network
    depends_on:
      - db-shared

networks:
  gpdi-network:
    driver: bridge

volumes:
  pg-shared-data:
