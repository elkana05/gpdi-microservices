services:
  # Database untuk setiap service (PostgreSQL)
  db-gateway:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: db_gateway
      POSTGRES_USER: user_gateway
      POSTGRES_PASSWORD: password_gateway
    networks:
      - gpdi-network
    volumes:
      - pg-data-gateway:/var/lib/postgresql/data

  db-admin:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: db_admin
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password_admin
    networks:
      - gpdi-network
    volumes:
      - pg-data-admin:/var/lib/postgresql/data

  db-content:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: db_content
      POSTGRES_USER: user_content
      POSTGRES_PASSWORD: password_content
    networks:
      - gpdi-network
    volumes:
      - pg-data-content:/var/lib/postgresql/data

  db-event:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: db_event
      POSTGRES_USER: user_event
      POSTGRES_PASSWORD: password_event
    networks:
      - gpdi-network
    volumes:
      - pg-data-event:/var/lib/postgresql/data

  db-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: db_user
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: password_user
    networks:
      - gpdi-network
    volumes:
      - pg-data-user:/var/lib/postgresql/data

  # Application Services
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    volumes:
      - ./api-gateway:/var/www
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - gpdi-network
    depends_on:
      - db-gateway

  administration-utility-service:
    build:
      context: ./administration-utility-service
      dockerfile: Dockerfile
    volumes:
      - ./administration-utility-service:/var/www
    ports:
      - "8004:8004"
    command: php artisan serve --host=0.0.0.0 --port=8004
    networks:
      - gpdi-network
    depends_on:
      - db-admin

  content-publication-service:
    build:
      context: ./content-publication-service
      dockerfile: Dockerfile
    volumes:
      - ./content-publication-service:/var/www
    ports:
      - "8002:8002"
    command: php artisan serve --host=0.0.0.0 --port=8002
    networks:
      - gpdi-network
    depends_on:
      - db-content

  event-rayon-service:
    build:
      context: ./event-rayon-service
      dockerfile: Dockerfile
    volumes:
      - ./event-rayon-service:/var/www
    ports:
      - "8003:8003"
    command: php artisan serve --host=0.0.0.0 --port=8003
    networks:
      - gpdi-network
    depends_on:
      - db-event

  user-account-service:
    build:
      context: ./user-account-service
      dockerfile: Dockerfile
    volumes:
      - ./user-account-service:/var/www
    ports:
      - "8001:8001"
    command: php artisan serve --host=0.0.0.0 --port=8001
    networks:
      - gpdi-network
    depends_on:
      - db-user

networks:
  gpdi-network:
    driver: bridge

volumes:
  pg-data-gateway:
  pg-data-admin:
  pg-data-content:
  pg-data-event:
  pg-data-user:
